<svg width="128" height="128" viewBox="0 0 128 128" color="#94A3B8" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <!-- D&D Chain Mail: Full mail hauberk with steel pauldrons, couters (elbow discs), and a double-prong buckled leather belt -->
  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main outline of suit -->
    <path d="M36,24 L48,15 L80,15 L92,24 L108,52 L94,58 L92,80 L90,112 L64,118 L38,112 L36,80 L34,58 L20,52 Z" stroke-width="3" fill="currentColor" fill-opacity="0.1"/>
    
    <!-- Long sleeves outlines -->
    <path d="M20,52 L26,76 L32,74 L34,58" stroke-width="2" fill="currentColor" fill-opacity="0.05"/>
    <path d="M108,52 L102,76 L96,74 L94,58" stroke-width="2" fill="currentColor" fill-opacity="0.05"/>

    <!-- Neck coif / collar -->
    <path d="M48,15 C52,24 76,24 80,15 L82,24 C82,24 74,30 64,30 C54,30 46,24 46,24 Z" stroke-width="2" fill="currentColor" fill-opacity="0.2"/>

    <!-- Steel pauldrons (shoulder guards) -->
    <path d="M30,28 C32,20 48,22 48,32 C42,34 32,32 30,28 Z" stroke-width="2.5" fill="currentColor" fill-opacity="0.4"/>
    <path d="M98,28 C96,20 80,22 80,32 C86,34 96,32 98,28 Z" stroke-width="2.5" fill="currentColor" fill-opacity="0.4"/>
    
    <!-- Steel couters (elbow discs) -->
    <circle cx="25" cy="74" r="5" stroke-width="2" fill="currentColor" fill-opacity="0.4"/>
    <circle cx="103" cy="74" r="5" stroke-width="2" fill="currentColor" fill-opacity="0.4"/>

    <!-- Leather waist belt with double-prong buckle -->
    <path d="M37,82 C48,85 80,85 91,82" stroke-width="3"/>
    <rect x="58" y="78" width="12" height="9" rx="1" fill="currentColor"/>
    <line x1="62" y1="78" x2="62" y2="87" stroke-width="1.5"/>
    <line x1="66" y1="78" x2="66" y2="87" stroke-width="1.5"/>

    <!-- Chain ring patterns (arched scallops) -->
    <path d="M48,36 C54,34 74,34 80,36" stroke-width="1.5" stroke-dasharray="2 3"/>
    <path d="M40,48 C52,44 76,44 88,48" stroke-width="1.5" stroke-dasharray="2 3"/>
    <path d="M38,60 C50,56 78,56 90,60" stroke-width="1.5" stroke-dasharray="2 3"/>
    <path d="M38,72 C50,68 78,68 90,72" stroke-width="1.5" stroke-dasharray="2 3"/>
    <path d="M38,94 C50,90 78,90 90,94" stroke-width="1.5" stroke-dasharray="2 3"/>
    <path d="M39,104 C50,100 78,100 89,104" stroke-width="1.5" stroke-dasharray="2 3"/>
  </g>
</svg>
