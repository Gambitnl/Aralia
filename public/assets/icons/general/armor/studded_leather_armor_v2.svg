<svg width="128" height="128" viewBox="0 0 128 128" color="#94A3B8" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <!-- D&D Studded Leather Armor: Paneled leather jerkin with collar laces, pauldrons, and rivets -->
  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main vest silhouette -->
    <path d="M36,24 L48,15 L64,22 L80,15 L92,24 L96,48 L90,84 L92,112 L64,118 L36,112 L38,84 L32,48 Z" stroke-width="3" fill="currentColor" fill-opacity="0.1"/>
    <!-- Armhole cutouts -->
    <path d="M32,48 C36,44 42,46 44,52 C44,68 38,80 38,84" stroke-width="2"/>
    <path d="M96,48 C92,44 86,46 84,52 C84,68 90,80 90,84" stroke-width="2"/>
    <!-- Collar neck opening -->
    <path d="M48,15 C52,24 76,24 80,15" stroke-width="2.5"/>
    <!-- Center seam division -->
    <path d="M64,22 L64,118" stroke-width="2"/>
    <!-- Laces at collar opening -->
    <path d="M61,28 L67,32 M67,34 L61,38 M61,40 L67,44" stroke-width="1.5"/>
    
    <!-- Reinforced shoulder plates (Pauldrons) -->
    <path d="M36,24 C40,32 54,30 54,20" stroke-width="2" fill="currentColor" fill-opacity="0.2"/>
    <path d="M92,24 C88,32 74,30 74,20" stroke-width="2" fill="currentColor" fill-opacity="0.2"/>
    
    <!-- Waist belt with buckle -->
    <path d="M37,84 C48,87 80,87 91,84" stroke-width="2.5"/>
    <rect x="61" y="81" width="6" height="8" rx="1" fill="currentColor"/>

    <!-- Studs on panels -->
    <!-- Left panel studs -->
    <circle cx="48" cy="40" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="56" cy="46" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="48" cy="56" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="56" cy="66" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="48" cy="74" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="46" cy="94" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="54" cy="104" r="2.5" fill="currentColor" stroke="none"/>
    <!-- Right panel studs -->
    <circle cx="80" cy="40" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="72" cy="46" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="80" cy="56" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="72" cy="66" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="80" cy="74" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="82" cy="94" r="2.5" fill="currentColor" stroke="none"/>
    <circle cx="74" cy="104" r="2.5" fill="currentColor" stroke="none"/>
  </g>
</svg>
