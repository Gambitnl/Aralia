<svg width="128" height="128" viewBox="0 0 128 128" color="#94A3B8" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <!-- D&D Chainmail Coif: Draped mail hood with detailed ring rows and leather brow strip -->
  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer drape structure -->
    <path d="M64,12 C42,12 28,26 28,52 C28,68 22,86 16,104 C32,112 64,116 64,116 C64,116 96,112 112,104 C106,86 100,68 100,52 C100,26 86,12 64,12 Z" stroke-width="3" fill="currentColor" fill-opacity="0.1"/>
    <!-- Face opening cutout -->
    <path d="M64,36 C50,36 44,48 44,64 C44,76 52,84 64,84 C76,84 84,76 84,64 C84,48 78,36 64,36 Z" stroke-width="2.5" fill="#151c24"/>
    <!-- Leather band over forehead -->
    <path d="M44,46 C52,43 76,43 84,46 C84,46 83,50 83,50 C75,47 53,47 45,50 Z" stroke-width="1.5" fill="currentColor"/>
    <!-- Buckle on leather band -->
    <rect x="61" y="44" width="6" height="7" rx="1" stroke-width="1"/>
    <!-- Interlocking ring textures (concentric scallops) -->
    <!-- Cap dome rings -->
    <path d="M36,32 C48,22 80,22 92,32" stroke-width="1.5" stroke-dasharray="2 3"/>
    <path d="M32,45 C48,34 80,34 96,45" stroke-width="1.5" stroke-dasharray="2 3"/>
    <path d="M30,58 C46,46 82,46 98,58" stroke-width="1.5" stroke-dasharray="2 3"/>
    <!-- Lower neck rings -->
    <path d="M22,76 C36,70 92,70 106,76" stroke-width="1.5" stroke-dasharray="2 3"/>
    <path d="M18,90 C34,82 94,82 110,90" stroke-width="1.5" stroke-dasharray="2 3"/>
    <path d="M16,104 C32,95 96,95 112,104" stroke-width="1.5" stroke-dasharray="2 3"/>
    <!-- Extra vertical weave highlights -->
    <path d="M30,52 C30,70 24,88 20,102 M100,52 C100,70 106,88 110,102" stroke-width="1" stroke-dasharray="1 4"/>
    <path d="M64,84 L64,116" stroke-width="1.5" stroke-dasharray="2 3"/>
  </g>
</svg>
