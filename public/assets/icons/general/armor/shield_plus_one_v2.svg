<svg width="128" height="128" viewBox="0 0 128 128" color="#94A3B8" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <!-- D&D +1 Shield: Magical heater shield adorned with glowing celestial runes, solar flares, and central crest emblem -->
  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer shield board -->
    <path d="M24,20 C54,20 64,12 64,12 C64,12 74,20 104,20 C104,56 94,92 64,116 C34,92 24,56 24,20 Z" stroke-width="3.5" fill="currentColor" fill-opacity="0.1"/>

    <!-- Inner gold/silver border -->
    <path d="M29,24 C53,24 64,18 64,18 C64,18 75,24 99,24 C99,53 89,86 64,109 C39,86 29,53 29,24 Z" stroke-width="2"/>

    <!-- Central dividing line -->
    <path d="M64,12 L64,116" stroke-width="2"/>

    <!-- Concentric Magic Rings in center -->
    <circle cx="64" cy="54" r="32" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="64" cy="54" r="26" stroke-width="1.5" stroke-opacity="0.7"/>
    <circle cx="64" cy="54" r="20" stroke-width="1" stroke-dasharray="1 2"/>

    <!-- Solar/Star emblem in the center -->
    <g stroke-width="1.5" fill="currentColor">
      <path d="M64,30 L67,46 L80,38 L72,50 L88,54 L72,58 L80,70 L67,62 L64,78 L61,62 L48,70 L56,58 L40,54 L56,50 L48,38 L61,46 Z"/>
      <circle cx="64" cy="54" r="5" fill="#151c24"/>
    </g>

    <!-- Runic sigils along the shield rim -->
    <!-- Top-left rune -->
    <path d="M38,28 L42,32 M38,32 L42,28 M40,28 L40,32" stroke-width="1.5"/>
    <!-- Top-right rune -->
    <path d="M86,28 L90,32 M86,32 L90,28 M88,28 L88,32" stroke-width="1.5"/>
    <!-- Middle-left rune -->
    <path d="M31,48 L35,52 M31,52 L35,48" stroke-width="1.5"/>
    <!-- Middle-right rune -->
    <path d="M93,48 L97,52 M93,52 L97,48" stroke-width="1.5"/>
    <!-- Lower-left rune -->
    <path d="M36,70 L40,74" stroke-width="1.5"/><circle cx="38" cy="72" r="1" fill="currentColor"/>
    <!-- Lower-right rune -->
    <path d="M88,70 L92,74" stroke-width="1.5"/><circle cx="90" cy="72" r="1" fill="currentColor"/>

    <!-- Glowing magical flares extending from the edges -->
    <path d="M24,20 L16,16 M104,20 L112,16 M64,116 L64,124" stroke-width="2"/>
    <path d="M24,56 L14,56 M104,56 L114,56" stroke-width="2"/>
  </g>
</svg>
