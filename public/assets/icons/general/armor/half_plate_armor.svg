<!--
  ARCHITECTURAL CONTEXT:
  This SVG represents 'Half Plate Armor' (Medium Armor torso piece) in Aralia's item system.
  It is styled as a polished metal breastplate with asymmetrical pauldrons and partial tassets,
  revealing the underlying leather/mail structure.

  DESIGN CHOICES:
  - Asymmetrical pauldrons: the left shoulder (X=26) features an extra high sword-breaker flange
    to represent combat orientation, while the right (X=102) has a standard plate guard.
  - Solid steel breastplate (Y=30 to Y=74) with a sharp vertical central ridge.
  - Distinct partial tassets (thigh plates) dangling at the bottom corners.
  - Negative space slits to show underlying leather straps.
  - currentColor inheritance is preserved for dynamic palette changes in-game.
-->
