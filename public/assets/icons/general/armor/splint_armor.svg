  DESIGN CHOICES:
  - Symmetrical heavy plate pauldrons (flaring to X=110) to convey a heavy bulk.
  - Symmetrical columns of vertical slats (splints) separated by negative-space gaps.
  - Round rivets (cutouts) on each splint, at top, middle, and bottom.
  - A horizontal leather belt (Y=72 to Y=78) dividing the chest splints from the skirt splints.
  - currentColor inheritance is preserved for dynamic palette changes in-game.
