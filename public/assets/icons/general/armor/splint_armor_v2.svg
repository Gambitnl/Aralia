<svg width="128" height="128" viewBox="0 0 128 128" color="#94A3B8" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <!-- D&D Splint Armor: Vertical steel slats riveted onto backing leather, with horizontal straps and heavy pauldrons -->
  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- Backing coat -->
    <path d="M36,24 L48,15 L80,15 L92,24 L96,48 L90,84 L92,112 L64,118 L36,112 L38,84 L32,48 Z" stroke-width="3" fill="currentColor" fill-opacity="0.1"/>
    
    <!-- Shoulder guards (Pauldrons) -->
    <path d="M30,28 C34,22 48,24 48,34 C44,48 32,42 30,28 Z" stroke-width="2" fill="currentColor" fill-opacity="0.2"/>
    <path d="M98,28 C94,22 80,24 80,34 C84,48 96,42 98,28 Z" stroke-width="2" fill="currentColor" fill-opacity="0.2"/>

    <!-- Splint chest slats -->
    <g stroke-width="2" fill="currentColor" fill-opacity="0.15">
      <!-- Slat 1 -->
      <path d="M38,36 H44 V80 H38 Z"/>
      <circle cx="41" cy="40" r="1" fill="currentColor" stroke="none"/>
      <circle cx="41" cy="76" r="1" fill="currentColor" stroke="none"/>
      <!-- Slat 2 -->
      <path d="M46,36 H52 V80 H46 Z"/>
      <circle cx="49" cy="40" r="1" fill="currentColor" stroke="none"/>
      <circle cx="49" cy="76" r="1" fill="currentColor" stroke="none"/>
      <!-- Slat 3 -->
      <path d="M54,36 H60 V80 H54 Z"/>
      <circle cx="57" cy="40" r="1" fill="currentColor" stroke="none"/>
      <circle cx="57" cy="76" r="1" fill="currentColor" stroke="none"/>
      <!-- Slat 4 -->
      <path d="M68,36 H74 V80 H68 Z"/>
      <circle cx="71" cy="40" r="1" fill="currentColor" stroke="none"/>
      <circle cx="71" cy="76" r="1" fill="currentColor" stroke="none"/>
      <!-- Slat 5 -->
      <path d="M76,36 H82 V80 H76 Z"/>
      <circle cx="79" cy="40" r="1" fill="currentColor" stroke="none"/>
      <circle cx="79" cy="76" r="1" fill="currentColor" stroke="none"/>
      <!-- Slat 6 -->
      <path d="M84,36 H90 V80 H84 Z"/>
      <circle cx="87" cy="40" r="1" fill="currentColor" stroke="none"/>
      <circle cx="87" cy="76" r="1" fill="currentColor" stroke="none"/>
    </g>

    <!-- Central leather gap/lacing -->
    <path d="M60,36 C62,40 66,40 68,36 M60,48 C62,52 66,52 68,48 M60,60 C62,64 66,64 68,60 M60,72 C62,76 66,76 68,72" stroke-width="1.5"/>

    <!-- Horizontal waist belts (Upper and Lower) -->
    <path d="M37,84 C48,87 80,87 91,84" stroke-width="2.5"/>
    <rect x="61" y="81" width="6" height="8" rx="1" fill="currentColor"/>
    
    <path d="M37,96 C48,99 80,99 91,96" stroke-width="2.5"/>
    <rect x="61" y="93" width="6" height="8" rx="1" fill="currentColor"/>
  </g>
</svg>
