<svg width="128" height="128" viewBox="0 0 128 128" color="#94A3B8" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <!-- D&D Scale Mail: Layered rows of leaf-shaped metal scales with distinct center ridges -->
  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- Silhouette of scale mail coat -->
    <path d="M36,24 L48,15 L80,15 L92,24 L96,48 L90,84 L92,112 L64,118 L36,112 L38,84 L32,48 Z" stroke-width="3" fill="currentColor" fill-opacity="0.1"/>
    
    <!-- Armhole bounds -->
    <path d="M32,48 C36,44 42,46 44,52 C44,68 38,80 38,84" stroke-width="2"/>
    <path d="M96,48 C92,44 86,46 84,52 C84,68 90,80 90,84" stroke-width="2"/>

    <!-- Neck Gorget plate -->
    <path d="M48,15 C52,24 76,24 80,15 L82,24 C82,24 74,32 64,32 C54,32 46,24 46,24 Z" stroke-width="2.5" fill="currentColor" fill-opacity="0.2"/>

    <!-- Scale Rows -->
    <!-- Row 1: y=38 -->
    <g stroke-width="1.5" fill="currentColor" fill-opacity="0.05">
      <path d="M42,38 C42,45 47,48 47,48 C47,48 52,45 52,38 Z"/><line x1="47" y1="38" x2="47" y2="48"/>
      <path d="M53,38 C53,45 58,48 58,48 C58,48 63,45 63,38 Z"/><line x1="58" y1="38" x2="58" y2="48"/>
      <path d="M64,38 C64,45 69,48 69,48 C69,48 74,45 74,38 Z"/><line x1="69" y1="38" x2="69" y2="48"/>
      <path d="M75,38 C75,45 80,48 80,48 C80,48 85,45 85,38 Z"/><line x1="80" y1="38" x2="80" y2="48"/>
    </g>

    <!-- Row 2: y=48 (offset horizontally) -->
    <g stroke-width="1.5" fill="currentColor" fill-opacity="0.05">
      <path d="M37,48 C37,55 42,58 42,58 C42,58 47,55 47,48 Z"/><line x1="42" y1="48" x2="42" y2="58"/>
      <path d="M48,48 C48,55 53,58 53,58 C53,58 58,55 58,48 Z"/><line x1="53" y1="48" x2="53" y2="58"/>
      <path d="M59,48 C59,55 64,58 64,58 C59,58 69,55 69,48 Z" fill="none"/><line x1="64" y1="48" x2="64" y2="58"/>
      <path d="M64,48 C64,55 69,58 69,58 C69,58 74,55 74,48 Z"/><line x1="69" y1="48" x2="69" y2="58"/>
      <path d="M75,48 C75,55 80,58 80,58 C80,58 85,55 85,48 Z"/><line x1="80" y1="48" x2="80" y2="58"/>
      <path d="M81,48 C81,55 86,58 86,58 C86,58 91,55 91,48 Z"/><line x1="86" y1="48" x2="86" y2="58"/>
    </g>

    <!-- Row 3: y=58 -->
    <g stroke-width="1.5" fill="currentColor" fill-opacity="0.05">
      <path d="M42,58 C42,65 47,68 47,68 C47,68 52,65 52,58 Z"/><line x1="47" y1="58" x2="47" y2="68"/>
      <path d="M53,58 C53,65 58,68 58,68 C58,68 63,65 63,58 Z"/><line x1="58" y1="58" x2="58" y2="68"/>
      <path d="M64,58 C64,65 69,68 69,68 C69,68 74,65 74,58 Z"/><line x1="69" y1="58" x2="69" y2="68"/>
      <path d="M75,58 C75,65 80,68 80,68 C80,68 85,65 85,58 Z"/><line x1="80" y1="58" x2="80" y2="68"/>
    </g>

    <!-- Row 4: y=68 -->
    <g stroke-width="1.5" fill="currentColor" fill-opacity="0.05">
      <path d="M37,68 C37,75 42,78 42,78 C42,78 47,75 47,68 Z"/><line x1="42" y1="68" x2="42" y2="78"/>
      <path d="M48,68 C48,75 53,78 53,78 C53,78 58,75 58,68 Z"/><line x1="53" y1="68" x2="53" y2="78"/>
      <path d="M59,68 C59,75 64,78 64,78 Z" fill="none"/><line x1="64" y1="68" x2="64" y2="78"/>
      <path d="M64,68 C64,75 69,78 69,78 C69,78 74,75 74,68 Z"/><line x1="69" y1="68" x2="69" y2="78"/>
      <path d="M75,68 C75,75 80,78 80,78 C80,78 85,75 85,68 Z"/><line x1="80" y1="68" x2="80" y2="78"/>
      <path d="M81,68 C81,75 86,78 86,78 C86,78 91,75 91,68 Z"/><line x1="86" y1="68" x2="86" y2="78"/>
    </g>

    <!-- Bottom Hem and Skirt Tassets -->
    <path d="M36,112 C48,115 80,115 92,112" stroke-width="2.5"/>
  </g>
</svg>
