<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E9D5FF" />
      <stop offset="50%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#7E22CE" />
    </linearGradient>
  </defs>

  <!-- Background Shadow Frame -->
  <path d="M50 10 L90 30 L90 70 L50 90 L10 70 L10 30 Z" fill="#1a1a1a" stroke="#4B2C71" stroke-width="2" />
  
  <!-- Outer Diamond Frame -->
  <path d="M50 15 L85 35 L85 65 L50 85 L15 65 L15 35 Z" 
        fill="none" stroke="#C084FC" stroke-width="3" stroke-linejoin="round" 
        filter="url(#glow)" />

  <!-- Sharding Illusion Effect -->
  <g filter="url(#glow)">
    <!-- Main Core Object (The 'Fake' Image) -->
    <path d="M50 30 L65 50 L50 70 L35 50 Z" fill="url(#grad-main)" />
    
    <!-- Fracture lines showing it's an illusion -->
    <path d="M50 30 L50 70 M35 50 L65 50" stroke="#1a1a1a" stroke-width="1" opacity="0.6" />
    
    <!-- Floating shards/fragments -->
    <path d="M68 40 L75 35 L72 45 Z" fill="#C084FC" />
    <path d="M32 60 L25 65 L30 55 Z" fill="#E9D5FF" />
    <path d="M65 65 L70 70 L60 72 Z" fill="#7E22CE" />
    <path d="M30 35 L22 30 L28 25 Z" fill="#C084FC" />
  </g>

  <!-- Decorative corner accents -->
  <circle cx="50" cy="15" r="2" fill="#E9D5FF" />
  <circle cx="50" cy="85" r="2" fill="#E9D5FF" />
  <circle cx="15" cy="50" r="2" fill="#E9D5FF" />
  <circle cx="85" cy="50" r="2" fill="#E9D5FF" />
</svg>
