<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="gradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E9D5FF" />
      <stop offset="50%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#7E22CE" />
    </linearGradient>
    <radialGradient id="radialFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Ambient energy pool -->
  <circle cx="50" cy="50" r="40" fill="url(#radialFade)" />

  <!-- The "Flickering" Object (A phantom dagger appearing from mist) -->
  <g filter="url(#glow)">
    <!-- Background ghost shape -->
    <path d="M50 20 L60 45 L50 80 L40 45 Z" fill="#C084FC" opacity="0.4" />
    
    <!-- Main solid illusion shape -->
    <path d="M50 25 L58 45 L50 75 L42 45 Z" fill="url(#gradMain)" />
    <path d="M42 45 L58 45 L50 35 Z" fill="#E9D5FF" opacity="0.7" />
    
    <!-- Fragmentation/Dissolve effect to show it's an illusion -->
    <rect x="55" y="30" width="4" height="4" fill="#C084FC" transform="rotate(15 55 30)" />
    <rect x="40" y="50" width="3" height="3" fill="#E9D5FF" transform="rotate(-20 40 50)" />
    <rect x="62" y="55" width="5" height="5" fill="#7E22CE" transform="rotate(45 62 55)" />
    <rect x="35" y="35" width="3" height="3" fill="#C084FC" transform="rotate(10 35 35)" />
  </g>

  <!-- Magical ripples/distortion rings -->
  <ellipse cx="50" cy="50" rx="35" ry="10" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.5" transform="rotate(-15 50 50)" />
  <ellipse cx="50" cy="50" rx="35" ry="10" fill="none" stroke="#E9D5FF" stroke-width="1" opacity="0.3" transform="rotate(15 50 50)" />
  
  <!-- Sparkling particles -->
  <circle cx="30" cy="30" r="1" fill="#E9D5FF" />
  <circle cx="70" cy="35" r="1" fill="#E9D5FF" />
  <circle cx="40" cy="70" r="1" fill="#E9D5FF" />
  <circle cx="60" cy="75" r="1" fill="#E9D5FF" />
</svg>
