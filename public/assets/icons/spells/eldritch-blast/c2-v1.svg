<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B5563" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>
    <radialGradient id="energyCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCA5A5" />
      <stop offset="60%" stop-color="#F87171" />
      <stop offset="100%" stop-color="#991B1B" />
    </radialGradient>
  </defs>

  <!-- Background shadow -->
  <circle cx="50" cy="50" r="45" fill="#111827" />

  <!-- The Casting Hand -->
  <g transform="translate(10, 20)" fill="url(#handGrad)" stroke="#000000" stroke-width="1">
    <!-- Wrist/Arm -->
    <path d="M20,80 L40,70 L45,60 L30,50 Z" />
    <!-- Palm -->
    <path d="M30,50 Q45,40 60,55 L65,75 Q45,85 30,70 Z" />
    <!-- Thumb -->
    <path d="M35,55 Q25,50 20,60 Q25,65 32,62 Z" />
    <!-- Index Finger (Pointing/Channeling) -->
    <path d="M55,50 Q60,30 75,25 Q80,25 80,30 Q75,35 65,55 Z" />
    <!-- Middle Finger -->
    <path d="M60,55 Q65,40 70,35 Q75,35 75,40 Q70,45 65,60 Z" />
    <!-- Ring Finger -->
    <path d="M65,60 Q70,50 75,45 Q80,45 80,50 Q75,55 70,65 Z" />
    <!-- Pinky -->
    <path d="M70,65 Q75,60 80,60 Q85,60 85,65 Q80,70 75,70 Z" />
  </g>

  <!-- The Crackling Energy at Fingertip -->
  <g filter="url(#glow)">
    <!-- Main Core -->
    <circle cx="82" cy="27" r="6" fill="url(#energyCore)" />
    
    <!-- Lightning Tendrils -->
    <path d="M82,27 L88,20 L84,24 L90,15 L86,22" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M82,27 L75,18 L78,24 L70,15 L76,22" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M82,27 L85,35 L80,32 L88,40 L83,36" fill="none" stroke="#FCA5A5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Outer Sparkles -->
    <circle cx="92" cy="12" r="1" fill="#FCA5A5" />
    <circle cx="68" cy="10" r="1" fill="#FCA5A5" />
    <circle cx="88" cy="42" r="1" fill="#FCA5A5" />
  </g>
</svg>
