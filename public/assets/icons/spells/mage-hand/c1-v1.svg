<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C7D2FE" />
      <stop offset="50%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
  </defs>

  <!-- Ethereal Aura/Mist -->
  <ellipse cx="50" cy="60" rx="30" ry="20" fill="#818CF8" opacity="0.2" filter="url(#glow)" />
  
  <!-- The Spectral Hand -->
  <g filter="url(#glow)">
    <!-- Palm -->
    <path d="M40 65 Q40 45 55 45 Q70 45 70 65 L65 75 Q55 80 45 75 Z" fill="url(#handGrad)" opacity="0.9" />
    
    <!-- Fingers (slightly curved, grasping motion) -->
    <path d="M42 48 Q35 35 40 30 Q45 25 50 35 L50 45" fill="url(#handGrad)" opacity="0.8" /> <!-- Index -->
    <path d="M52 45 Q55 30 62 28 Q67 26 65 35 L60 45" fill="url(#handGrad)" opacity="0.8" /> <!-- Middle -->
    <path d="M62 48 Q70 38 75 42 Q78 46 70 52 L65 48" fill="url(#handGrad)" opacity="0.8" /> <!-- Ring -->
    <path d="M70 55 Q80 55 82 62 Q82 68 75 65 L70 60" fill="url(#handGrad)" opacity="0.8" /> <!-- Pinky -->
    
    <!-- Thumb -->
    <path d="M40 65 Q30 60 32 50 Q35 45 40 50 L42 60" fill="url(#handGrad)" opacity="0.8" />
  </g>

  <!-- Magical Particles ( Conjuration sparks) -->
  <circle cx="30" cy="40" r="1.5" fill="#C7D2FE" />
  <circle cx="70" cy="30" r="1" fill="#C7D2FE" />
  <circle cx="80" cy="50" r="2" fill="#818CF8" />
  <circle cx="20" cy="60" r="1" fill="#C7D2FE" />
  <circle cx="50" cy="20" r="1.2" fill="#C7D2FE" />
</svg>
