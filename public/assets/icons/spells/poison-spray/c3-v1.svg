<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#34D399" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7" />
      <stop offset="50%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#065F46" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2" result="blur" />
    </filter>
  </defs>

  <!-- Background Atmosphere -->
  <circle cx="50" cy="50" r="40" fill="url(#glow)" />

  <!-- The Hexagonal Frame (Necromantic Seal) -->
  <path d="M50 15 L80 32 L80 68 L50 85 L20 68 L20 32 Z" 
        fill="none" 
        stroke="#065F46" 
        stroke-width="3" 
        stroke-linejoin="round" />
  
  <!-- Internal Ornamentation -->
  <path d="M50 20 L50 80 M25 35 L75 65 M25 65 L75 35" 
        stroke="#065F46" 
        stroke-width="1" 
        opacity="0.5" />

  <!-- Central Poison Symbol (The Dripping Skull/Flask Hybrid) -->
  <g filter="url(#blur)">
    <!-- Main Body -->
    <path d="M50 30 C40 30 35 40 35 50 C35 60 45 65 50 65 C55 65 65 60 65 50 C65 40 60 30 50 30 Z" 
          fill="url(#grad)" />
    
    <!-- The Drip -->
    <path d="M45 65 Q50 80 55 65 Z" fill="#065F46" />
  </g>

  <!-- Detail Highlights -->
  <path d="M42 45 A3 3 0 1 1 42.1 45" fill="#D1FAE5" />
  <path d="M58 45 A3 3 0 1 1 58.1 45" fill="#D1FAE5" />

  <!-- Floating Toxic Spores -->
  <circle cx="30" cy="30" r="2" fill="#34D399" />
  <circle cx="70" cy="35" r="1.5" fill="#34D399" />
  <circle cx="35" cy="70" r="2" fill="#34D399" />
  <circle cx="65" cy="75" r="1" fill="#34D399" />
</svg>
