<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B91C1C" />
      <stop offset="50%" stop-color="#F87171" />
      <stop offset="100%" stop-color="#FCA5A5" />
    </linearGradient>
  </defs>

  <!-- Background Vignette -->
  <circle cx="50" cy="50" r="45" fill="#1A1A1A" stroke="#333" stroke-width="1" />

  <!-- Target Silhouette (Chest/Shoulder in Metal Armor) -->
  <path d="M60 40 L85 45 L80 80 L55 75 Z" fill="#4B5563" stroke="#1F2937" stroke-width="2" />
  <path d="M60 40 Q72 35 85 45" fill="none" stroke="#9CA3AF" stroke-width="2" />
  <path d="M65 55 L75 55 M65 65 L75 65" stroke="#374151" stroke-width="2" stroke-linecap="round" />

  <!-- Casting Hand (reaching in from left) -->
  <path d="M10 60 Q25 55 40 60 L45 65 L35 70 Q20 70 10 65 Z" fill="#2D2D2D" stroke="#000" stroke-width="1" />

  <!-- Lightning Arc Effect -->
  <g filter="url(#glow)">
    <!-- Main Bolt -->
    <path d="M42 62 L48 58 L44 64 L52 60 L48 68 L58 62 L54 72 L65 65" 
          fill="none" 
          stroke="url(#boltGrad)" 
          stroke-width="3" 
          stroke-linejoin="round" 
          stroke-linecap="round" />
    
    <!-- Secondary Sparks -->
    <path d="M52 60 L56 55" stroke="#F87171" stroke-width="1.5" />
    <path d="M58 62 L62 60" stroke="#F87171" stroke-width="1.5" />
    <path d="M54 72 L58 76" stroke="#F87171" stroke-width="1.5" />
    
    <!-- Impact Burst -->
    <circle cx="65" cy="65" r="4" fill="#FCA5A5" />
    <path d="M65 58 L65 62 M65 68 L65 72 M59 65 L63 65 M67 65 L71 65" 
          stroke="#F87171" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
