<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="frostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F87171" />
      <stop offset="50%" stop-color="#991B1B" />
      <stop offset="100%" stop-color="#450A0A" />
    </linearGradient>
    <radialGradient id="coreGrad">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#F87171" />
      <stop offset="100%" stop-color="#7F1D1D" />
    </radialGradient>
  </defs>

  <!-- Background frame: A jagged, crystalline diamond shape -->
  <path d="M50 5 L85 50 L50 95 L15 50 Z" fill="none" stroke="#450A0A" stroke-width="4" stroke-linejoin="bevel" />
  <path d="M50 12 L80 50 L50 88 L20 50 Z" fill="#2D0A0A" />

  <!-- The frozen impact emblem -->
  <g filter="url(#glow)">
    <!-- Central Impact Point -->
    <circle cx="50" cy="50" r="12" fill="url(#coreGrad)" />
    
    <!-- Frost Shards radiating outward (The "Freeze" effect) -->
    <path d="M50 35 L54 20 L46 20 Z" fill="#F87171" />
    <path d="M65 50 L80 54 L80 46 Z" fill="#F87171" />
    <path d="M50 65 L46 80 L54 80 Z" fill="#F87171" />
    <path d="M35 50 L20 46 L20 54 Z" fill="#F87171" />
    
    <!-- Secondary smaller spikes -->
    <path d="M60 40 L68 32 L62 36 Z" fill="#B91C1C" />
    <path d="M40 40 L32 32 L38 36 Z" fill="#B91C1C" />
    <path d="M60 60 L68 68 L62 64 Z" fill="#B91C1C" />
    <path d="M40 60 L32 68 L38 64 Z" fill="#B91C1C" />
  </g>

  <!-- The "Slowing" Ring: Broken arcs representing restricted movement -->
  <path d="M30 50 A 20 20 0 0 1 50 30" fill="none" stroke="#F87171" stroke-width="3" stroke-linecap="round" />
  <path d="M70 50 A 20 20 0 0 1 50 70" fill="none" stroke="#F87171" stroke-width="3" stroke-linecap="round" />
  <path d="M30 50 A 20 20 0 0 0 50 70" fill="none" stroke="#7F1D1D" stroke-width="2" stroke-dasharray="4 2" />
  <path d="M70 50 A 20 20 0 0 0 50 30" fill="none" stroke="#7F1D1D" stroke-width="2" stroke-dasharray="4 2" />

  <!-- Outer crystal accents -->
  <path d="M15 50 L10 45 L15 40" fill="none" stroke="#F87171" stroke-width="2" />
  <path d="M85 50 L90 45 L85 40" fill="none" stroke="#F87171" stroke-width="2" />
</svg>
