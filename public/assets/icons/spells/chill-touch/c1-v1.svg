<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="spiritGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7" />
      <stop offset="100%" stop-color="#065F46" />
    </linearGradient>
    <radialGradient id="impactGrad">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#34D399" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Aura -->
  <circle cx="50" cy="50" r="40" fill="url(#impactGrad)" />

  <!-- Target (Abstract Torso/Chest) -->
  <path d="M30 60 Q50 50 70 60 L75 85 L25 85 Z" fill="#1A1A1A" stroke="#333" stroke-width="1" />

  <!-- The Spectral Hand -->
  <g filter="url(#glow)">
    <!-- Arm/Sleeve of ghost light -->
    <path d="M80 20 Q60 30 55 45" stroke="#34D399" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6" />
    
    <!-- Hand Palm and Fingers -->
    <path d="M55 45 
             C 50 40, 40 40, 40 50 
             L 42 55 L 45 52 L 47 55 L 50 52 L 53 55 L 56 52 L 58 55 
             C 60 55, 65 50, 62 45 Z" 
          fill="url(#spiritGrad)" />
    
    <!-- Frost Cracks radiating from point of impact -->
    <path d="M50 50 L40 40 M50 50 L60 40 M50 50 L45 60 M50 50 L55 60 M50 50 L35 50 M50 50 L65 50" 
          stroke="#34D399" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Necrotic Chill Particles -->
  <circle cx="40" cy="35" r="1.5" fill="#6EE7B7" />
  <circle cx="60" cy="30" r="1" fill="#34D399" />
  <circle cx="55" cy="65" r="2" fill="#065F46" />
  <circle cx="45" cy="70" r="1" fill="#6EE7B7" />
</svg>
