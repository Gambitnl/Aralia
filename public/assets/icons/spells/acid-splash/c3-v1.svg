<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="acidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCA5A5" />
      <stop offset="50%" stop-color="#F87171" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>
  </defs>

  <!-- Background Shadow/Aura -->
  <path d="M50 10 L60 40 L90 50 L60 60 L50 90 L40 60 L10 50 L40 40 Z" fill="#450a0a" opacity="0.6" filter="url(#glow)" />

  <!-- The Corrosive Diamond Frame -->
  <path d="M50 15 L85 50 L50 85 L15 50 Z" fill="none" stroke="#F87171" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Central Burst / Splash Effect -->
  <path d="M50 30 C60 30 70 40 70 50 C70 60 60 70 50 70 C40 70 30 60 30 50 C30 40 40 30 50 30" fill="url(#acidGrad)" filter="url(#glow)" />
  
  <!-- Corrosive "Erosion" Spikes radiating from center -->
  <g stroke="#F87171" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="40" x2="50" y2="20" />
    <line x1="60" y1="50" x2="80" y2="50" />
    <line x1="50" y1="60" x2="50" y2="80" />
    <line x1="40" y1="50" x2="20" y2="50" />
    <line x1="65" y1="35" x2="75" y2="25" />
    <line x1="65" y1="65" x2="75" y2="75" />
    <line x1="35" y1="65" x2="25" y2="75" />
    <line x1="35" y1="35" x2="25" y2="25" />
  </g>

  <!-- Splatter Droplets -->
  <circle cx="30" cy="30" r="2" fill="#FCA5A5" />
  <circle cx="70" cy="30" r="2" fill="#FCA5A5" />
  <circle cx="70" cy="70" r="2" fill="#FCA5A5" />
  <circle cx="30" cy="70" r="2" fill="#FCA5A5" />
  
  <!-- Central Core -->
  <circle cx="50" cy="50" r="8" fill="#7F1D1D" />
</svg>
