<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B5563" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>
    <radialGradient id="acidCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCA5A5" />
      <stop offset="60%" stop-color="#F87171" />
      <stop offset="100%" stop-color="#991B1B" />
    </radialGradient>
  </defs>

  <!-- Background shadow for depth -->
  <circle cx="50" cy="50" r="45" fill="#111827" opacity="0.5" />

  <!-- Casting Hand (Silhouette/Dark Fantasy Style) -->
  <g filter="url(#glow)">
    <path d="M30,85 Q35,70 40,60 L55,45 Q60,40 65,45 L75,55 Q80,60 75,65 L65,75 Q60,80 55,85 Z" fill="url(#skinGrad)" stroke="#000000" stroke-width="1" />
    <!-- Fingers curled as if holding a sphere -->
    <path d="M55,45 Q58,35 65,40" fill="none" stroke="#1F2937" stroke-width="3" stroke-linecap="round" />
    <path d="M65,45 Q70,35 75,40" fill="none" stroke="#1F2937" stroke-width="3" stroke-linecap="round" />
    <path d="M50,50 Q45,40 40,45" fill="none" stroke="#1F2937" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- The Acidic Bubble being formed -->
  <g filter="url(#glow)">
    <!-- Main Sphere -->
    <circle cx="55" cy="40" r="12" fill="url(#acidCore)" />
    
    <!-- Highlighting for liquid look -->
    <ellipse cx="52" cy="36" rx="4" ry="2" fill="#FFFFFF" opacity="0.6" />
    
    <!-- Droplets/Hissing steam escaping the bubble -->
    <path d="M45,35 Q42,30 45,25" stroke="#F87171" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8" />
    <path d="M65,35 Q68,30 65,25" stroke="#F87171" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8" />
    <circle cx="42" cy="32" r="1.5" fill="#FCA5A5" />
    <circle cx="68" cy="32" r="1.5" fill="#FCA5A5" />
  </g>

  <!-- Ground caustic splash/base -->
  <path d="M35,85 Q50,80 65,85" stroke="#991B1B" stroke-width="2" fill="none" opacity="0.6" />
</svg>
