<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-alchemy_jug" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b2e3f" />
      <stop offset="100%" stop-color="#041420" />
    </linearGradient>
    <linearGradient id="borderGrad-alchemy_jug" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow-alchemy_jug" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow-alchemy_jug" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <radialGradient id="gemGrad-alchemy_jug" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  
  <rect width="256" height="256" rx="40" fill="url(#bg-alchemy_jug)" />
  <!-- subtle background pattern -->
  <path d="M0,0 L256,256 M256,0 L0,256 M128,0 L128,256 M0,128 L256,128" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />
  <circle cx="128" cy="128" r="90" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />

        <g filter="url(#shadow-alchemy_jug)">
          <path d="M110,40 C90,40 70,80 70,140 C70,190 90,210 128,210 C166,210 186,190 186,140 C186,80 166,40 146,40 Z" fill="#cd853f" />
          <path d="M110,40 C90,40 70,80 70,140 C70,190 90,210 128,210 C166,210 186,190 186,140 C186,80 166,40 146,40 Z" fill="url(#gemGrad-alchemy_jug)" opacity="0.4" />
          <ellipse cx="128" cy="40" rx="20" ry="10" fill="#8b4513" />
          <path d="M176,90 C210,90 210,150 182,160" fill="none" stroke="#cd853f" stroke-width="16" stroke-linecap="round" />
          <path d="M74,90 C40,90 50,70 60,60" fill="none" stroke="#cd853f" stroke-width="12" stroke-linecap="round" />
          <path d="M70,130 Q128,150 186,130" fill="none" stroke="#ffd700" stroke-width="6" />
          <path d="M70,160 Q128,180 186,160" fill="none" stroke="#ffd700" stroke-width="6" />
        </g>
        
  
  <!-- Fancy Border -->
  <rect width="232" height="232" x="12" y="12" rx="32" fill="none" stroke="url(#borderGrad-alchemy_jug)" stroke-width="4" />
  <rect width="216" height="216" x="20" y="20" rx="24" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Text Background -->
  <rect x="16" y="200" width="224" height="40" rx="12" fill="#000000" fill-opacity="0.6" />
  
  <text x="128" y="226" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5" text-anchor="middle" filter="url(#glow-alchemy_jug)">ALCHEMY JUG</text>
</svg>