<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-alchemist_s_fire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b2e3f" />
      <stop offset="100%" stop-color="#041420" />
    </linearGradient>
    <linearGradient id="borderGrad-alchemist_s_fire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow-alchemist_s_fire" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow-alchemist_s_fire" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <radialGradient id="gemGrad-alchemist_s_fire" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  
  <rect width="256" height="256" rx="40" fill="url(#bg-alchemist_s_fire)" />
  <!-- subtle background pattern -->
  <path d="M0,0 L256,256 M256,0 L0,256 M128,0 L128,256 M0,128 L256,128" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />
  <circle cx="128" cy="128" r="90" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />

        <g filter="url(#shadow-alchemist_s_fire)">
          <path d="M128,60 C100,90 80,120 80,160 A48,48 0 0,0 176,160 C176,120 156,90 128,60 Z" fill="#ff4500" filter="url(#glow-alchemist_s_fire)" opacity="0.9" />
          <path d="M128,60 C100,90 80,120 80,160 A48,48 0 0,0 176,160 C176,120 156,90 128,60 Z" fill="url(#gemGrad-alchemist_s_fire)" opacity="0.6" />
          <path d="M110,160 Q128,120 146,160 Q128,140 110,160 Z" fill="#ffff00" filter="url(#glow-alchemist_s_fire)" />
          <rect x="116" y="36" width="24" height="24" rx="4" fill="#696969" />
          <rect x="112" y="56" width="32" height="6" fill="#a0522d" />
        </g>
        
  
  <!-- Fancy Border -->
  <rect width="232" height="232" x="12" y="12" rx="32" fill="none" stroke="url(#borderGrad-alchemist_s_fire)" stroke-width="4" />
  <rect width="216" height="216" x="20" y="20" rx="24" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Text Background -->
  <rect x="16" y="200" width="224" height="40" rx="12" fill="#000000" fill-opacity="0.6" />
  
  <text x="128" y="226" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5" text-anchor="middle" filter="url(#glow-alchemist_s_fire)">ALCHEMIST'S FIRE</text>
</svg>