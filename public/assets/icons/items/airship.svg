<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-airship" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d300b" />
      <stop offset="100%" stop-color="#1c1503" />
    </linearGradient>
    <linearGradient id="borderGrad-airship" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow-airship" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow-airship" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <radialGradient id="gemGrad-airship" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  
  <rect width="256" height="256" rx="40" fill="url(#bg-airship)" />
  <!-- subtle background pattern -->
  <path d="M0,0 L256,256 M256,0 L0,256 M128,0 L128,256 M0,128 L256,128" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />
  <circle cx="128" cy="128" r="90" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />

        <g filter="url(#shadow-airship)">
          <ellipse cx="128" cy="90" rx="90" ry="45" fill="#e6c280" />
          <ellipse cx="128" cy="90" rx="90" ry="45" fill="url(#gemGrad-airship)" opacity="0.5" />
          <path d="M38,90 Q128,140 218,90" fill="none" stroke="#8b4513" stroke-width="2" />
          <path d="M68,60 Q128,120 188,60" fill="none" stroke="#8b4513" stroke-width="2" />
          <!-- Gondola -->
          <path d="M100,150 L156,150 L146,190 L110,190 Z" fill="#5c3a21" />
          <line x1="128" y1="135" x2="128" y2="150" stroke="#8b4513" stroke-width="6" />
          <line x1="90" y1="120" x2="110" y2="150" stroke="#8b4513" stroke-width="4" />
          <line x1="166" y1="120" x2="146" y2="150" stroke="#8b4513" stroke-width="4" />
          <!-- Propeller -->
          <ellipse cx="80" cy="170" rx="4" ry="12" fill="#aaaaaa" />
          <ellipse cx="176" cy="170" rx="4" ry="12" fill="#aaaaaa" />
        </g>
        
  
  <!-- Fancy Border -->
  <rect width="232" height="232" x="12" y="12" rx="32" fill="none" stroke="url(#borderGrad-airship)" stroke-width="4" />
  <rect width="216" height="216" x="20" y="20" rx="24" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Text Background -->
  <rect x="16" y="200" width="224" height="40" rx="12" fill="#000000" fill-opacity="0.6" />
  
  <text x="128" y="226" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5" text-anchor="middle" filter="url(#glow-airship)">AIRSHIP</text>
</svg>