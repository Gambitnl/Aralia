<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-1_rod_of_the_pact_keeper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a0e1b" />
      <stop offset="100%" stop-color="#1a050d" />
    </linearGradient>
    <linearGradient id="borderGrad-1_rod_of_the_pact_keeper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow-1_rod_of_the_pact_keeper" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow-1_rod_of_the_pact_keeper" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <radialGradient id="gemGrad-1_rod_of_the_pact_keeper" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  
  <rect width="256" height="256" rx="40" fill="url(#bg-1_rod_of_the_pact_keeper)" />
  <!-- subtle background pattern -->
  <path d="M0,0 L256,256 M256,0 L0,256 M128,0 L128,256 M0,128 L256,128" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />
  <circle cx="128" cy="128" r="90" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />

        <g filter="url(#shadow-1_rod_of_the_pact_keeper)">
          <path d="M124,50 L132,50 L136,200 L120,200 Z" fill="#555555" stroke="#333333" stroke-width="2"/>
          <path d="M110,160 L146,160 L142,190 L114,190 Z" fill="#886622" />
          <circle cx="128" cy="50" r="18" fill="#ff4444" filter="url(#glow-1_rod_of_the_pact_keeper)" />
          <path d="M110,60 C128,80 146,60 146,60 C146,60 128,40 110,60 Z" fill="#ccaa44" />
        </g>
        
  
  <!-- Fancy Border -->
  <rect width="232" height="232" x="12" y="12" rx="32" fill="none" stroke="url(#borderGrad-1_rod_of_the_pact_keeper)" stroke-width="4" />
  <rect width="216" height="216" x="20" y="20" rx="24" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Text Background -->
  <rect x="16" y="200" width="224" height="40" rx="12" fill="#000000" fill-opacity="0.6" />
  
  <text x="128" y="226" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5" text-anchor="middle" filter="url(#glow-1_rod_of_the_pact_keeper)">+1 ROD OF THE PACT KEEPER</text>
</svg>