<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-alchemist_s_supplies" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d300b" />
      <stop offset="100%" stop-color="#1c1503" />
    </linearGradient>
    <linearGradient id="borderGrad-alchemist_s_supplies" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow-alchemist_s_supplies" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow-alchemist_s_supplies" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <radialGradient id="gemGrad-alchemist_s_supplies" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  
  <rect width="256" height="256" rx="40" fill="url(#bg-alchemist_s_supplies)" />
  <!-- subtle background pattern -->
  <path d="M0,0 L256,256 M256,0 L0,256 M128,0 L128,256 M0,128 L256,128" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />
  <circle cx="128" cy="128" r="90" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />

        <g filter="url(#shadow-alchemist_s_supplies)">
          <!-- Box -->
          <path d="M60,130 L196,130 L186,190 L70,190 Z" fill="#6b4226" />
          <path d="M60,130 L128,90 L196,130 Z" fill="#8b5a2b" />
          <!-- Vials -->
          <rect x="80" y="100" width="16" height="30" rx="4" fill="#00ff00" filter="url(#glow-alchemist_s_supplies)" opacity="0.8" />
          <rect x="80" y="100" width="16" height="30" rx="4" fill="url(#gemGrad-alchemist_s_supplies)" opacity="0.5" />
          <rect x="84" y="90" width="8" height="10" fill="#aaaaaa" />
          
          <rect x="105" y="90" width="20" height="40" rx="10" fill="#ff0000" filter="url(#glow-alchemist_s_supplies)" opacity="0.8" />
          <rect x="105" y="90" width="20" height="40" rx="10" fill="url(#gemGrad-alchemist_s_supplies)" opacity="0.5" />
          <rect x="111" y="80" width="8" height="10" fill="#8b4513" />

          <path d="M140,110 L150,130 L160,130 L170,110 Z" fill="#0000ff" filter="url(#glow-alchemist_s_supplies)" opacity="0.8" />
          <path d="M140,110 L150,130 L160,130 L170,110 Z" fill="url(#gemGrad-alchemist_s_supplies)" opacity="0.5" />
          <rect x="151" y="100" width="8" height="10" fill="#aaaaaa" />
          
          <!-- Box front details -->
          <rect x="120" y="145" width="16" height="10" rx="2" fill="#ffd700" />
          <line x1="70" y1="160" x2="186" y2="160" stroke="#4a2e1b" stroke-width="4" />
        </g>
        
  
  <!-- Fancy Border -->
  <rect width="232" height="232" x="12" y="12" rx="32" fill="none" stroke="url(#borderGrad-alchemist_s_supplies)" stroke-width="4" />
  <rect width="216" height="216" x="20" y="20" rx="24" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Text Background -->
  <rect x="16" y="200" width="224" height="40" rx="12" fill="#000000" fill-opacity="0.6" />
  
  <text x="128" y="226" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5" text-anchor="middle" filter="url(#glow-alchemist_s_supplies)">ALCHEMIST'S SUPPLIES</text>
</svg>