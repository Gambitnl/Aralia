<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-ale_mug" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d300b" />
      <stop offset="100%" stop-color="#1c1503" />
    </linearGradient>
    <linearGradient id="borderGrad-ale_mug" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow-ale_mug" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow-ale_mug" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <radialGradient id="gemGrad-ale_mug" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  
  <rect width="256" height="256" rx="40" fill="url(#bg-ale_mug)" />
  <!-- subtle background pattern -->
  <path d="M0,0 L256,256 M256,0 L0,256 M128,0 L128,256 M0,128 L256,128" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />
  <circle cx="128" cy="128" r="90" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />

        <g filter="url(#shadow-ale_mug)">
          <path d="M86,70 L170,70 L160,180 L96,180 Z" fill="#a0522d" />
          <path d="M86,70 L170,70 L160,180 L96,180 Z" fill="url(#gemGrad-ale_mug)" opacity="0.3" />
          <path d="M165,90 Q195,90 195,120 Q195,150 162,150" fill="none" stroke="#703a1f" stroke-width="16" stroke-linecap="round" />
          <path d="M90,100 L166,100" fill="none" stroke="#4a2e1b" stroke-width="8" />
          <path d="M94,150 L162,150" fill="none" stroke="#4a2e1b" stroke-width="8" />
          <ellipse cx="128" cy="70" rx="42" ry="16" fill="#e8c382" />
          <!-- Foam -->
          <circle cx="100" cy="65" r="14" fill="#ffffff" filter="url(#glow-ale_mug)" />
          <circle cx="120" cy="55" r="18" fill="#ffffff" filter="url(#glow-ale_mug)" />
          <circle cx="145" cy="60" r="16" fill="#ffffff" filter="url(#glow-ale_mug)" />
          <circle cx="160" cy="70" r="12" fill="#ffffff" filter="url(#glow-ale_mug)" />
        </g>
        
  
  <!-- Fancy Border -->
  <rect width="232" height="232" x="12" y="12" rx="32" fill="none" stroke="url(#borderGrad-ale_mug)" stroke-width="4" />
  <rect width="216" height="216" x="20" y="20" rx="24" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Text Background -->
  <rect x="16" y="200" width="224" height="40" rx="12" fill="#000000" fill-opacity="0.6" />
  
  <text x="128" y="226" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5" text-anchor="middle" filter="url(#glow-ale_mug)">ALE (MUG)</text>
</svg>