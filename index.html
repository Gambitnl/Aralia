<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.tailwindcss.com https://esm.sh;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://i.ibb.co https://i.pinimg.com;
      connect-src 'self' blob: https://generativelanguage.googleapis.com https://api.groq.com ws://localhost:* http://localhost:* ws://127.0.0.1:* http://127.0.0.1:*;
      worker-src 'self' blob:;
    ">
  <title>Aralia RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Load premium decorative serif headers (Cinzel Decorative), standard serif headers (Cinzel), classical body serif (Quattrocento), and clean modern sans-serif (Outfit) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Quattrocento:wght@400;700&family=Outfit:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Quattrocento:wght@400;700&family=Outfit:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet">
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet">
  </noscript>
  <!-- Custom styles including spell-card, glossary, and other component styles -->
</head>

<body class="bg-gray-900">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script>
    // Cold-start guard: if the app hasn't mounted within 6s (e.g. the initial
    // module request was aborted while the dev server was still warming up),
    // show a notice and reload up to 2 times instead of staying black.
    (function () {
      var RETRY_KEY = 'aralia-mount-retries';
      // The Dev Menu's shared Debug Log — key + entry shape must stay in sync
      // with src/utils/debugLog.ts (this script runs pre-modules, no imports).
      // Persisted to localStorage so the Dev Menu can show whether the guard
      // ever fired (sessionStorage would vanish with the tab; the whole point
      // is later visibility).
      var DEBUG_LOG_KEY = 'aralia-debug-log';
      function logEvent(event, attempt) {
        try {
          var message = event === 'retry' ? 'App failed to mount — self-heal retry #' + attempt
            : event === 'recovered' ? 'App recovered after ' + attempt + (attempt === 1 ? ' retry' : ' retries')
            : 'App failed to mount after ' + attempt + ' retries — gave up';
          var dbg = JSON.parse(localStorage.getItem(DEBUG_LOG_KEY) || '[]');
          dbg.push({ time: new Date().toISOString(), category: 'startup-recovery', message: message, data: { event: event, attempt: attempt, url: location.pathname + location.search } });
          localStorage.setItem(DEBUG_LOG_KEY, JSON.stringify(dbg.slice(-100)));
        } catch (_) { /* storage unavailable; guard still works without the log */ }
      }
      window.addEventListener('load', function () {
        setTimeout(function () {
          var root = document.getElementById('root');
          var retries = Number(sessionStorage.getItem(RETRY_KEY) || '0');
          if (root && root.childElementCount > 0) {
            if (retries > 0) logEvent('recovered', retries);
            sessionStorage.removeItem(RETRY_KEY);
            return;
          }
          if (retries >= 2) {
            logEvent('gave-up', retries);
            root.innerHTML = '<p style="color:#e5e7eb;font-family:sans-serif;text-align:center;margin-top:40vh">Aralia failed to load after several attempts. Check the dev server and refresh.</p>';
            return;
          }
          logEvent('retry', retries + 1);
          sessionStorage.setItem(RETRY_KEY, String(retries + 1));
          root.innerHTML = '<p style="color:#e5e7eb;font-family:sans-serif;text-align:center;margin-top:40vh">Still loading Aralia&hellip; retrying.</p>';
          location.reload();
        }, 6000);
      });
    })();
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
