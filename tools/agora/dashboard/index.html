<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🏛️ Agora — Agent Coordination</title>
<style>
  :root {
    --bg: #0e1117;
    --panel: #161b22;
    --panel-2: #1c2230;
    --border: #2b3340;
    --border-strong: #3a4456;
    --text: #e6edf3;
    --text-dim: #9aa7b4;
    --text-faint: #6e7d8c;
    --accent: #58a6ff;
    --green: #2ec27e;
    --amber: #e3a008;
    --red: #f85149;
    --mono: ui-monospace, "SFMono-Regular", "Cascadia Code", "Consolas", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.45;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 12px 20px;
    background: linear-gradient(180deg, #141a23, #0e1117);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand h1 { font-size: 20px; margin: 0; letter-spacing: 0.5px; }
  .brand .meta { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  .conn {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--text-dim);
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px;
    background: var(--panel);
  }
  .conn .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); box-shadow: 0 0 6px var(--red); }
  .conn.up .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .conn.up .dot { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .counts { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .count {
    display: flex; flex-direction: column; align-items: center;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 4px 14px; min-width: 64px;
  }
  .count .n { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .count .l { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-faint); }

  /* ---------- Grid ---------- */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 14px;
    padding: 16px 20px 28px;
    max-width: 1500px;
    margin: 0 auto;
  }
  @media (max-width: 920px) { main { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    min-height: 220px;
    overflow: hidden;
  }
  .panel > h2 {
    margin: 0;
    padding: 11px 16px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    background: var(--panel-2);
  }
  .panel > h2 .badge {
    margin-left: auto;
    font-size: 11px;
    background: #21303f;
    color: var(--accent);
    border-radius: 999px;
    padding: 1px 9px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
  }
  .body { padding: 8px; overflow-y: auto; flex: 1; }
  .feed-body { max-height: 420px; }

  .empty {
    color: var(--text-faint);
    font-style: italic;
    text-align: center;
    padding: 28px 12px;
    font-size: 13px;
  }

  /* ---------- Presence ---------- */
  .agent-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
  }
  .agent-row:hover { background: var(--panel-2); }
  .sdot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
  .sdot.online { background: var(--green); box-shadow: 0 0 6px rgba(46,194,126,.7); }
  .sdot.stale { background: var(--amber); box-shadow: 0 0 6px rgba(227,160,8,.6); }
  .agent-main { min-width: 0; flex: 1; }
  .agent-handle { font-weight: 600; }
  .agent-handle .id { color: var(--text-faint); font-family: var(--mono); font-size: 11px; font-weight: 400; margin-left: 6px; }
  .agent-note { color: var(--text-dim); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-seen { color: var(--text-faint); font-size: 11px; font-family: var(--mono); white-space: nowrap; }

  /* ---------- Locks ---------- */
  .lock-row {
    padding: 9px 11px; border-radius: 8px; margin-bottom: 6px;
    border: 1px solid var(--border); background: var(--panel-2);
  }
  .lock-row.soon { border-color: var(--amber); }
  .lock-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .lock-holder { font-weight: 600; }
  .lock-countdown {
    margin-left: auto; font-family: var(--mono); font-size: 12px;
    color: var(--text-dim); font-variant-numeric: tabular-nums;
  }
  .lock-row.soon .lock-countdown { color: var(--amber); font-weight: 600; }
  .lock-row.expired .lock-countdown { color: var(--red); }
  .lock-tokens { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
  .tok {
    font-family: var(--mono); font-size: 12px;
    background: #0c1622; color: #9fd0ff; border: 1px solid #1d3a55;
    border-radius: 5px; padding: 1px 7px;
  }
  .tok.glob { color: #ffd9a0; border-color: #553f1d; background: #221a0c; }
  .lock-reason { color: var(--text-dim); font-size: 12px; }
  .lock-reason::before { content: "“"; } .lock-reason::after { content: "”"; }

  /* ---------- Task board ---------- */
  .task-cols { display: flex; flex-direction: column; gap: 10px; }
  .task-group { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .task-group > h3 {
    margin: 0; padding: 6px 11px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.6px; display: flex; align-items: center; gap: 8px;
    background: var(--panel-2); color: var(--text-dim);
  }
  .task-group > h3 .gcount { margin-left: auto; font-variant-numeric: tabular-nums; }
  .task-group > h3 .gdot { width: 8px; height: 8px; border-radius: 50%; }
  .gdot.open { background: #58a6ff; }
  .gdot.claimed { background: #a371f7; }
  .gdot.in_progress { background: #e3a008; }
  .gdot.blocked { background: #f85149; }
  .gdot.done { background: #2ec27e; }
  .task-row { padding: 7px 11px; border-top: 1px solid var(--border); }
  .task-row:first-child { border-top: none; }
  .task-title { font-weight: 600; }
  .task-sub { color: var(--text-faint); font-size: 11px; font-family: var(--mono); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
  .task-sub .who { color: var(--text-dim); }

  /* ---------- Messages ---------- */
  .msg { padding: 6px 10px; border-radius: 8px; margin-bottom: 3px; }
  .msg:hover { background: var(--panel-2); }
  .msg-head { display: flex; align-items: center; gap: 7px; font-size: 12px; margin-bottom: 1px; }
  .msg-from { font-weight: 600; color: var(--accent); }
  .arrow { color: var(--text-faint); }
  .pill {
    font-size: 10px; padding: 0 7px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .pill.bcast { background: #2a2118; color: #ffce8a; border: 1px solid #553f1d; }
  .pill.direct { background: #161f2c; color: #9fd0ff; border: 1px solid #1d3a55; text-transform: none; letter-spacing: 0; font-family: var(--mono); }
  .msg-time { margin-left: auto; color: var(--text-faint); font-size: 11px; font-family: var(--mono); }
  .msg-body { color: var(--text); font-size: 13px; word-break: break-word; }

  .ts-now { color: var(--text-faint); font-size: 11px; font-family: var(--mono); }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>🏛️ Agora</h1>
      <span class="meta" id="hdr-meta">connecting…</span>
      <a href="http://127.0.0.1:3040/agent_matrix.html"
         title="Operator cockpit — external-agent fleet dispatch, quotas, live terminals"
         style="margin-left:12px;font-size:12px;color:var(--cyan,#67e8f9);text-decoration:none;border:1px solid rgba(148,163,184,.3);border-radius:8px;padding:2px 8px;white-space:nowrap;">🛰️ Cockpit</a>
    </div>
    <div class="conn" id="conn"><span class="dot"></span><span id="conn-label">reconnecting</span></div>
    <div class="counts" id="counts">
      <div class="count"><span class="n" id="c-agents">–</span><span class="l">agents</span></div>
      <div class="count"><span class="n" id="c-locks">–</span><span class="l">locks</span></div>
      <div class="count"><span class="n" id="c-tasks">–</span><span class="l">tasks</span></div>
      <div class="count"><span class="n" id="c-messages">–</span><span class="l">messages</span></div>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>👥 Presence <span class="badge" id="b-agents">0</span></h2>
      <div class="body" id="presence"></div>
    </section>

    <section class="panel">
      <h2>🔒 Locks <span class="badge" id="b-locks">0</span></h2>
      <div class="body" id="locks"></div>
    </section>

    <section class="panel">
      <h2>📋 Task Board <span class="badge" id="b-tasks">0</span></h2>
      <div class="body" id="tasks"></div>
    </section>

    <section class="panel">
      <h2>💬 Message Feed <span class="badge" id="b-messages">0</span></h2>
      <div class="body feed-body" id="feed"></div>
    </section>
  </main>

<script>
(() => {
  "use strict";

  // ----------------------------- state -----------------------------
  const ST = {
    agents: [],            // [{id,handle,note,status,lastSeen,...}]
    locks: [],             // [{id,paths,globs,agentId,reason,createdAt,expiresAt}]
    tasks: [],             // [{id,title,state,createdBy,claimedBy,updatedAt,...}]
    messages: [],          // [{id,seq,from,to,body,createdAt}]
    health: null,
    seenMsgSeq: 0,
    autoScroll: true,
  };

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

  // agentId -> handle resolution, fallback to short id slice.
  function handleOf(id) {
    if (!id) return "?";
    if (id === "all") return "all";
    const a = ST.agents.find((x) => x.id === id);
    if (a && a.handle) return a.handle;
    return id.length > 8 ? id.slice(0, 8) : id;
  }

  function relTime(ms) {
    if (!ms) return "—";
    const d = Date.now() - ms;
    if (d < 0) return "now";
    const s = Math.floor(d / 1000);
    if (s < 5) return "just now";
    if (s < 60) return s + "s ago";
    const m = Math.floor(s / 60);
    if (m < 60) return m + "m ago";
    const h = Math.floor(m / 60);
    if (h < 24) return h + "h ago";
    return Math.floor(h / 24) + "d ago";
  }
  function clockTime(ms) {
    if (!ms) return "";
    const dt = new Date(ms);
    const p = (n) => String(n).padStart(2, "0");
    return p(dt.getHours()) + ":" + p(dt.getMinutes()) + ":" + p(dt.getSeconds());
  }
  function fmtDuration(ms) {
    if (ms <= 0) return "expired";
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + "s";
    const m = Math.floor(s / 60);
    const rem = s % 60;
    if (m < 60) return m + "m " + String(rem).padStart(2, "0") + "s";
    const h = Math.floor(m / 60);
    return h + "h " + String(m % 60).padStart(2, "0") + "m";
  }

  // ----------------------------- renderers -----------------------------
  function renderPresence() {
    const el = $("presence");
    $("b-agents").textContent = ST.agents.length;
    if (!ST.agents.length) { el.innerHTML = '<div class="empty">No agents online</div>'; return; }
    const rows = [...ST.agents].sort((a, b) => (b.lastSeen || 0) - (a.lastSeen || 0)).map((a) => {
      const status = a.status === "online" ? "online" : "stale";
      return `<div class="agent-row">
        <span class="sdot ${status}" title="${status}"></span>
        <div class="agent-main">
          <div class="agent-handle">${esc(a.handle)}<span class="id">${esc((a.id||"").slice(0,8))}</span></div>
          ${a.note ? `<div class="agent-note">${esc(a.note)}</div>` : ""}
        </div>
        <span class="agent-seen">${relTime(a.lastSeen)}</span>
      </div>`;
    });
    el.innerHTML = rows.join("");
  }

  function renderLocks() {
    const el = $("locks");
    $("b-locks").textContent = ST.locks.length;
    if (!ST.locks.length) { el.innerHTML = '<div class="empty">No active locks</div>'; return; }
    const now = Date.now();
    const rows = [...ST.locks].sort((a, b) => (a.expiresAt || 0) - (b.expiresAt || 0)).map((l) => {
      const remain = (l.expiresAt || 0) - now;
      const soon = remain > 0 && remain < 5 * 60 * 1000;
      const expired = remain <= 0;
      const cls = expired ? "expired" : (soon ? "soon" : "");
      const toks = [
        ...(l.paths || []).map((p) => `<span class="tok" title="path">${esc(p)}</span>`),
        ...(l.globs || []).map((g) => `<span class="tok glob" title="glob">${esc(g)}</span>`),
      ].join("");
      return `<div class="lock-row ${cls}">
        <div class="lock-head">
          <span class="sdot online"></span>
          <span class="lock-holder">${esc(handleOf(l.agentId))}</span>
          <span class="lock-countdown" data-expires="${l.expiresAt || 0}">${fmtDuration(remain)}</span>
        </div>
        <div class="lock-tokens">${toks || '<span class="tok">(no tokens)</span>'}</div>
        ${l.reason ? `<div class="lock-reason">${esc(l.reason)}</div>` : ""}
      </div>`;
    });
    el.innerHTML = rows.join("");
  }

  const TASK_ORDER = ["open", "claimed", "in_progress", "blocked", "done"];
  const TASK_LABEL = { open: "Open", claimed: "Claimed", in_progress: "In Progress", blocked: "Blocked", done: "Done" };

  function renderTasks() {
    const el = $("tasks");
    $("b-tasks").textContent = ST.tasks.length;
    if (!ST.tasks.length) { el.innerHTML = '<div class="empty">No tasks yet</div>'; return; }
    const groups = TASK_ORDER.map((stateKey) => {
      const list = ST.tasks.filter((t) => t.state === stateKey)
        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      if (!list.length) return "";
      const rows = list.map((t) => `<div class="task-row">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-sub">
          ${t.claimedBy ? `<span class="who">▸ ${esc(handleOf(t.claimedBy))}</span>` : `<span>by ${esc(handleOf(t.createdBy))}</span>`}
          <span>updated ${relTime(t.updatedAt)}</span>
        </div>
      </div>`).join("");
      return `<div class="task-group">
        <h3><span class="gdot ${stateKey}"></span>${TASK_LABEL[stateKey]}<span class="gcount">${list.length}</span></h3>
        ${rows}
      </div>`;
    }).filter(Boolean).join("");
    el.innerHTML = `<div class="task-cols">${groups}</div>`;
  }

  function renderFeed() {
    const el = $("feed");
    $("b-messages").textContent = ST.messages.length;
    if (!ST.messages.length) { el.innerHTML = '<div class="empty">No messages yet</div>'; return; }
    const msgs = [...ST.messages].sort((a, b) => (a.seq || 0) - (b.seq || 0));
    el.innerHTML = msgs.map((m) => {
      const broadcast = m.to === "all" || !m.to;
      const target = broadcast
        ? `<span class="pill bcast">broadcast</span>`
        : `<span class="pill direct">@${esc(handleOf(m.to))}</span>`;
      return `<div class="msg">
        <div class="msg-head">
          <span class="msg-from">${esc(handleOf(m.from))}</span>
          <span class="arrow">→</span>
          ${target}
          <span class="msg-time">${clockTime(m.createdAt)}</span>
        </div>
        <div class="msg-body">${esc(m.body)}</div>
      </div>`;
    }).join("");
    if (ST.autoScroll) el.scrollTop = el.scrollHeight;
  }

  function renderHeader() {
    const h = ST.health;
    if (h) {
      $("hdr-meta").textContent = `v${h.version} · up ${fmtDuration((h.uptime||0)*1000)} · :${h.port||"?"}`;
      if (h.counts) {
        $("c-agents").textContent = h.counts.agents;
        $("c-locks").textContent = h.counts.locks;
        $("c-tasks").textContent = h.counts.tasks;
        $("c-messages").textContent = h.counts.messages;
      }
    } else {
      // derive counts from local state if /health unavailable
      $("c-agents").textContent = ST.agents.length;
      $("c-locks").textContent = ST.locks.length;
      $("c-tasks").textContent = ST.tasks.length;
      $("c-messages").textContent = ST.messages.length;
    }
  }

  // Tick countdowns + relative times every second without full re-render churn.
  function tick() {
    const now = Date.now();
    document.querySelectorAll(".lock-countdown[data-expires]").forEach((node) => {
      const exp = Number(node.getAttribute("data-expires"));
      const remain = exp - now;
      node.textContent = fmtDuration(remain);
      const row = node.closest(".lock-row");
      if (row) {
        row.classList.toggle("soon", remain > 0 && remain < 5 * 60 * 1000);
        row.classList.toggle("expired", remain <= 0);
      }
    });
  }

  // ----------------------------- data fetching -----------------------------
  async function getJSON(url) {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error(url + " -> " + r.status);
    return r.json();
  }

  async function refreshAgents() {
    try { ST.agents = (await getJSON("/agents")).agents || []; renderPresence(); renderLocks(); renderTasks(); renderFeed(); }
    catch (e) { /* keep last good */ }
  }
  async function refreshLocks() {
    try { ST.locks = (await getJSON("/locks")).locks || []; renderLocks(); } catch (e) {}
  }
  async function refreshTasks() {
    try { ST.tasks = (await getJSON("/tasks")).tasks || []; renderTasks(); } catch (e) {}
  }
  async function refreshHealth() {
    try { ST.health = await getJSON("/health"); renderHeader(); } catch (e) {}
  }
  async function refreshMessages() {
    try {
      const data = await getJSON("/messages?since=" + ST.seenMsgSeq);
      const incoming = data.messages || [];
      for (const m of incoming) {
        if (!ST.messages.some((x) => x.id === m.id)) ST.messages.push(m);
        if (m.seq > ST.seenMsgSeq) ST.seenMsgSeq = m.seq;
      }
      renderFeed();
    } catch (e) {}
  }

  async function fullRefresh() {
    await Promise.all([refreshHealth(), refreshAgents(), refreshLocks(), refreshTasks(), refreshMessages()]);
    renderHeader();
  }

  // ----------------------------- SSE wiring -----------------------------
  let es = null;
  function setConn(up) {
    const c = $("conn");
    c.classList.toggle("up", up);
    $("conn-label").textContent = up ? "SSE connected" : "reconnecting";
  }

  // Structural events trigger a targeted re-fetch (low volume, simplest robust path).
  function onStructural(kind) {
    if (kind === "agent") refreshAgents();
    else if (kind === "lock") { refreshLocks(); refreshHealth(); }
    else if (kind === "task") { refreshTasks(); refreshHealth(); }
  }

  function handleEvent(type, data) {
    switch (type) {
      case "agent.register":
      case "agent.touch":
      case "agent.drop":
        onStructural("agent"); refreshHealth(); break;
      case "lock.acquire":
      case "lock.release":
      case "lock.expired":
        onStructural("lock"); break;
      case "task.create":
      case "task.claim":
      case "task.state":
      case "task.handoff":
        onStructural("task"); break;
      case "message.post": {
        // Incremental append from payload; resolve handles from current agents.
        const m = data && data.message ? data.message : data;
        if (m && m.id && !ST.messages.some((x) => x.id === m.id)) {
          ST.messages.push(m);
          if (m.seq > ST.seenMsgSeq) ST.seenMsgSeq = m.seq;
          renderFeed();
          refreshHealth();
        }
        break;
      }
      default:
        // Unknown event type: be safe, do a light refresh.
        refreshHealth();
    }
  }

  function connect() {
    if (es) { try { es.close(); } catch (e) {} }
    es = new EventSource("/events");

    es.addEventListener("open", () => setConn(true));
    es.addEventListener("error", () => setConn(false)); // EventSource auto-reconnects

    // The `hello` event seeds all four panels from the server snapshot.
    es.addEventListener("hello", (ev) => {
      setConn(true);
      try {
        const d = JSON.parse(ev.data);
        const snap = d.snapshot || {};
        ST.agents = snap.agents || [];
        ST.locks = snap.locks || [];
        ST.tasks = snap.tasks || [];
        renderPresence(); renderLocks(); renderTasks();
        // messages aren't in the hello snapshot — pull them via REST.
        refreshMessages();
        refreshHealth();
      } catch (e) {}
    });

    // Named live events. Each carries {...payload, type, ts, seq}.
    const NAMED = [
      "agent.register", "agent.touch", "agent.drop",
      "lock.acquire", "lock.release", "lock.expired",
      "task.create", "task.claim", "task.state", "task.handoff",
      "message.post",
    ];
    for (const name of NAMED) {
      es.addEventListener(name, (ev) => {
        let data = {};
        try { data = JSON.parse(ev.data); } catch (e) {}
        handleEvent(name, data);
      });
    }

    // Generic onmessage catch (unnamed events) — defensive.
    es.onmessage = (ev) => {
      try {
        const d = JSON.parse(ev.data);
        if (d && d.type) handleEvent(d.type, d);
      } catch (e) {}
    };
  }

  // Keep the feed pinned to bottom only when the user is already near the bottom.
  $("feed").addEventListener("scroll", () => {
    const el = $("feed");
    ST.autoScroll = (el.scrollHeight - el.scrollTop - el.clientHeight) < 40;
  });

  // ----------------------------- boot -----------------------------
  fullRefresh();   // REST seed on load (also a fallback if SSE is slow)
  connect();       // SSE primary
  setInterval(tick, 1000);              // countdowns / relative times
  setInterval(() => { refreshHealth(); refreshAgents(); }, 15000); // presence freshness (agent.stale isn't emitted)
})();
</script>
</body>
