# GitHub Pages deployment is PUBLIC. As of 2026-07-06 the build NO LONGER embeds the
# GEMINI_API_KEY: vite.config.ts stopped `define`-ing it into the bundle, so AI features
# are gated off on the public site (they run locally via a VITE_GEMINI_API_KEY in .env).
# Do NOT re-add a key secret to this build, or it becomes extractable from the shipped JS.
# If the public site needs live AI, proxy the calls through a server that holds the key.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # GitHub's node 22 image ships npm 10, but the lockfile is generated with
      # npm 11 (the daily-snapshot machine), and the two resolve the nested
      # @docsearch react-18 peer differently. Align to npm 11 so `npm ci` accepts
      # the committed lockfile instead of failing with "missing … from lock file".
      - name: Use npm 11 (align with lockfile generator)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      # Currently deploys without verifying code quality or catching type errors.
      # No GEMINI_API_KEY is passed here on purpose — the client build must not embed a
      # key into the public bundle (see the header note and vite.config.ts).
      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
